name = "lavender"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "lavender_db"
database_name = "lavender-db"
database_id = "bbc77a7e-325b-4426-8e96-7fffe2941ea7"

# Rate limiter state. The id below is a placeholder for local dev only —
# before `pnpm deploy` a real KV namespace must be created with
# `wrangler kv namespace create RATE_LIMIT_KV` and its id substituted in.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "0000000000000000000000000000000000"
